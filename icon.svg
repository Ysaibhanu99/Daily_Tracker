      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
  </defs>
  <!-- Background Rounded Rect -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#grad)" />
  
  <!-- Calendar Ring Hooks -->
  <rect x="128" y="96" width="32" height="64" rx="16" fill="#ffffff" opacity="0.3" />
  <rect x="240" y="96" width="32" height="64" rx="16" fill="#ffffff" opacity="0.3" />
  <rect x="352" y="96" width="32" height="64" rx="16" fill="#ffffff" opacity="0.3" />
  
  <!-- Inner Sheet/Planner card -->
  <rect x="96" y="144" width="320" height="272" rx="24" fill="#ffffff" />
  
  <!-- Planner writing lines -->
  <rect x="144" y="208" width="144" height="20" rx="10" fill="#cbd5e1" />
  <rect x="144" y="264" width="224" height="20" rx="10" fill="#cbd5e1" />
  <rect x="144" y="320" width="192" height="20" rx="10" fill="#cbd5e1" />
  
  <!-- Custom check box and checkmark in top-right of sheet -->
